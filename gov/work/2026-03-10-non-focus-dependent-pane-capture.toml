[govctl]
schema = 1
id = "WI-2026-03-10-002"
title = "Non-focus-dependent pane capture"
status = "done"
created = "2026-03-10"
started = "2026-03-10"
completed = "2026-03-10"
refs = [
    "ADR-0005",
    "ADR-0006",
]

[content]
description = """
Per [[ADR-0005]], pane capture currently requires focusing the target pane, running `zellij action dump-screen`, then restoring focus. This means two concurrent captures on different panes in the same session race on focus, making it impossible for agents to monitor multiple panes simultaneously.

This work item implements plugin-side capture using the `get_pane_scrollback` API (Zellij PR #4465, merged Oct 2025). The zrpc plugin now handles a `pane.capture` RPC method that reads pane content directly without changing focus. The CLI tries RPC-based capture first and falls back to focus-dump-restore for older plugin versions.

Related: [[ADR-0005]], [[ADR-0006]] (wait-idle inherits the same limitation)."""

[[content.acceptance_criteria]]
text = "zrpc plugin implements pane.capture RPC method using get_pane_scrollback"
status = "done"
